<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creativity Warm-Ups</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0000cc;
            --surface: #0000ee;
            --primary: #0000ff;
            --text: #ffffff;
            --text-light: rgba(255,255,255,0.7);
            --border: rgba(255,255,255,0.2);
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-hover: 0 12px 40px rgba(0,0,0,0.45);
            --radius: 18px;
            --transition: 0.32s cubic-bezier(.4,0,.2,1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: #0000ff;
            color: #fff;
            padding: 48px 24px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 30%, rgba(255,255,255,0.06) 0%, transparent 55%);
            pointer-events: none;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 800;
            letter-spacing: -1px;
            position: relative;
            color: #ffffff;
        }

        header p {
            margin-top: 12px;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.75);
            position: relative;
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            padding: 22px 24px 18px;
            background: #0000dd;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(0,0,0,0.25);
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 220px;
            max-width: 380px;
        }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
            pointer-events: none;
            stroke: #fff;
        }

        #search {
            width: 100%;
            padding: 11px 16px 11px 42px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 50px;
            font-size: 0.97rem;
            background: rgba(255,255,255,0.1);
            color: #ffffff;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        #search::placeholder { color: rgba(255,255,255,0.5); }
        #search:focus {
            border-color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
        }

        .filter-btns { display: flex; flex-wrap: wrap; gap: 8px; }

        .filter-btn {
            padding: 8px 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: rgba(255,255,255,0.75);
            transition: all var(--transition);
        }

        .filter-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #ffffff;
            border-color: rgba(255,255,255,0.55);
        }

        .filter-btn.active {
            background: #ffffff;
            color: #0000ff;
            border-color: #ffffff;
            font-weight: 800;
        }

        .count-badge {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.65);
            white-space: nowrap;
        }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 24px;
            padding: 36px 28px 64px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== CARD ===== */
        .card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-6px) scale(1.012);
            box-shadow: var(--shadow-hover);
            background: rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.4);
        }

        .card.hidden { display: none; }

        .card-accent {
            height: 4px;
            width: 100%;
            background: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .card-header {
            padding: 22px 22px 14px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        /* Simple white SVG icon box */
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
        }

        .card-icon svg {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-title-block { flex: 1; }

        .card-title {
            font-size: 1.18rem;
            font-weight: 800;
            line-height: 1.25;
            color: #ffffff;
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            font-size: 0.77rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 3px 10px 3px 8px;
            border-radius: 50px;
            background: rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.25);
        }

        .card-tag svg {
            width: 13px;
            height: 13px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .card-goal {
            padding: 0 22px 14px;
            font-size: 0.93rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.55;
        }

        .card-meta {
            display: flex;
            gap: 14px;
            padding: 0 22px 14px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
            flex-wrap: wrap;
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-meta svg {
            width: 13px;
            height: 13px;
            stroke: rgba(255,255,255,0.55);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .card-footer {
            margin-top: auto;
            padding: 13px 22px;
            border-top: 1px solid rgba(255,255,255,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .expand-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 0.87rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 50px;
            transition: background var(--transition);
            color: rgba(255,255,255,0.85);
        }

        .expand-btn:hover { background: rgba(255,255,255,0.2); color: #ffffff; }

        .expand-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform var(--transition);
        }

        .card.expanded .expand-btn svg { transform: rotate(180deg); }

        .time-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 50px;
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.75);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .time-chip svg {
            width: 12px;
            height: 12px;
            stroke: rgba(255,255,255,0.6);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
        }

        /* ===== EXPANDED DETAILS ===== */
        .card-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.55s cubic-bezier(.4,0,.2,1);
        }

        .card.expanded .card-details { max-height: 1200px; }

        .card-details-inner {
            padding: 0 22px 26px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .detail-section { margin-top: 18px; }

        .detail-section h4 {
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .detail-section h4 svg {
            width: 14px;
            height: 14px;
            stroke: rgba(255,255,255,0.55);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .step-list { list-style: none; }
        .step-list li {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 0.91rem;
            line-height: 1.55;
            align-items: flex-start;
            color: rgba(255,255,255,0.88);
        }

        .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            flex-shrink: 0;
            background: rgba(255,255,255,0.2);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.3);
            margin-top: 1px;
        }

        .bullet-list { list-style: none; }
        .bullet-list li {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.91rem;
            line-height: 1.5;
            color: rgba(255,255,255,0.88);
            align-items: flex-start;
        }

        .bullet-arrow {
            color: rgba(255,255,255,0.6);
            flex-shrink: 0;
            margin-top: 1px;
            font-weight: 700;
        }

        .materials-grid { display: flex; flex-wrap: wrap; gap: 8px; }

        .material-chip {
            font-size: 0.82rem;
            padding: 5px 12px;
            border-radius: 50px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.9);
        }

        .notice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .notice-item {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.86rem;
            line-height: 1.45;
            border-left: 3px solid rgba(255,255,255,0.45);
            color: rgba(255,255,255,0.85);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 24px;
            color: rgba(255,255,255,0.6);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            stroke: rgba(255,255,255,0.4);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            margin-bottom: 16px;
        }

        .empty-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: #ffffff; }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,80,0.8);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: #0000ee;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 24px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            transform: scale(0.93) translateY(20px);
            transition: transform var(--transition);
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }

        .modal-overlay.open .modal { transform: scale(1) translateY(0); }

        .modal-accent {
            height: 5px;
            border-radius: 24px 24px 0 0;
            background: rgba(255,255,255,0.5);
        }

        .modal-header {
            padding: 24px 28px 16px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .modal-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
        }

        .modal-icon svg {
            width: 28px;
            height: 28px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .modal-title-block { flex: 1; }

        .modal-title {
            font-size: 1.55rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
        }

        .modal-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 7px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 12px 4px 9px;
            border-radius: 50px;
            background: rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.25);
        }

        .modal-tag svg {
            width: 13px;
            height: 13px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .modal-close {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.8);
            transition: background var(--transition);
            flex-shrink: 0;
        }

        .modal-close:hover { background: rgba(255,255,255,0.25); color: #ffffff; }

        .modal-close svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .modal-body { padding: 0 28px 32px; color: #ffffff; }

        .modal-goal {
            font-size: 1rem;
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
            margin-bottom: 18px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            border-left: 4px solid rgba(255,255,255,0.5);
        }

        .modal-desc {
            font-size: 0.97rem;
            line-height: 1.65;
            color: rgba(255,255,255,0.82);
            margin-bottom: 24px;
        }

        .modal-section { margin-bottom: 22px; }

        .modal-section h4 {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.55);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-section h4 svg {
            width: 14px;
            height: 14px;
            stroke: rgba(255,255,255,0.5);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 10px; }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card { animation: fadeInUp 0.4s ease both; }
        .card:nth-child(1)  { animation-delay: 0.03s; }
        .card:nth-child(2)  { animation-delay: 0.06s; }
        .card:nth-child(3)  { animation-delay: 0.09s; }
        .card:nth-child(4)  { animation-delay: 0.12s; }
        .card:nth-child(5)  { animation-delay: 0.15s; }
        .card:nth-child(6)  { animation-delay: 0.18s; }
        .card:nth-child(7)  { animation-delay: 0.21s; }
        .card:nth-child(8)  { animation-delay: 0.24s; }
        .card:nth-child(9)  { animation-delay: 0.27s; }
        .card:nth-child(10) { animation-delay: 0.30s; }
        .card:nth-child(11) { animation-delay: 0.33s; }
        .card:nth-child(12) { animation-delay: 0.36s; }
        .card:nth-child(13) { animation-delay: 0.39s; }
        .card:nth-child(14) { animation-delay: 0.42s; }
        .card:nth-child(15) { animation-delay: 0.45s; }
        .card:nth-child(16) { animation-delay: 0.48s; }
        .card:nth-child(17) { animation-delay: 0.51s; }
        .card:nth-child(18) { animation-delay: 0.54s; }
        .card:nth-child(19) { animation-delay: 0.57s; }
        .card:nth-child(20) { animation-delay: 0.60s; }

        @media (max-width: 600px) {
            .grid { padding: 20px 16px 48px; gap: 16px; }
            .controls { padding: 14px 16px; }
            .notice-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Creativity Warm-Ups</h1>
    <p>20 activities to spark divergent thinking, ideation & creative confidence</p>
</header>

<div class="controls">
    <div class="search-wrap">
        <svg width="17" height="17" fill="none" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Search activities…" aria-label="Search activities">
    </div>
    <div class="filter-btns" id="filterBtns">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="divergent">Divergent Thinking</button>
        <button class="filter-btn" data-filter="collaboration">Collaboration</button>
        <button class="filter-btn" data-filter="communication">Communication</button>
        <button class="filter-btn" data-filter="empathy">Empathy</button>
        <button class="filter-btn" data-filter="prototyping">Prototyping</button>
    </div>
    <span class="count-badge" id="countBadge">20 activities</span>
</div>

<div class="grid" id="grid"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal">
        <div class="modal-accent"></div>
        <div class="modal-header">
            <div class="modal-icon" id="modalIcon"></div>
            <div class="modal-title-block">
                <div class="modal-title" id="modalTitle"></div>
                <span class="modal-tag" id="modalTag"></span>
            </div>
            <button class="modal-close" id="modalClose" aria-label="Close">
                <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
/* ===== SVG ICON LIBRARY ===== */
const icons = {
    // Category icons
    divergent: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>',
    collaboration: '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    communication: '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
    empathy: '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
    prototyping: '<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',

    // Activity-specific icons

const grid = document.getElementById('grid');

/* ===== RENDER CARDS ===== */
function renderCards(data) {
    grid.innerHTML = '';
    if (data.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <h3>No activities found</h3>
                <p>Try adjusting your search or filter.</p>
            </div>`;
        return;
    }

    data.forEach((a, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = a.id;
        card.style.animationDelay = (i * 0.04) + 's';

        card.innerHTML = `
            <div class="card-accent"></div>
            <div class="card-header">
                <div class="card-icon">${icons[a.icon] || icons.divergent}</div>
                <div class="card-title-block">
                    <div class="card-title">${a.title}</div>
                    <span class="card-tag">
                        ${icons[a.category]}
                        ${a.categoryLabel}
                    </span>
                </div>
            </div>
            <div class="card-goal">${a.goal}</div>
            <div class="card-meta">
                <span>
                    ${icons.clock}
                    ${a.time}
                </span>
                <span>
                    ${icons.materials}
                    ${a.materials.length} materials
                </span>
                <span>
                    ${icons.steps}
                    ${a.instructions.length} steps
                </span>
            </div>
            <div class="card-footer">
                <button class="expand-btn" data-id="${a.id}">
                    <span>Details</span>
                    <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <span class="time-chip">
                    ${icons.clock}
                    ${a.time}
                </span>
            </div>
            <div class="card-details" id="details-${a.id}">
                <div class="card-details-inner">
                    <div class="detail-section">
                        <h4>${icons.materials} Materials</h4>
                        <div class="materials-grid">
                            ${a.materials.map(m => '<span class="material-chip">' + m + '</span>').join('')}
                        </div>
                    </div>
                    <div class="detail-section">
                        <h4>${icons.instructions} Instructions</h4>
                        <ol class="step-list">
                            ${a.instructions.map((s, idx) => '<li><span class="step-num">' + (idx+1) + '</span>' + s + '</li>').join('')}
                        </ol>
                    </div>
                    <div class="detail-section">
                        <h4>${icons.todo} To Do</h4>
                        <ul class="bullet-list">
                            ${a.todo.map(t => '<li><span class="bullet-arrow">→</span>' + t + '</li>').join('')}
                        </ul>
                    </div>
                    <div class="detail-section">
                        <h4>${icons.notice} Notice</h4>
                        <div class="notice-grid">
                            ${a.notice.map(n => '<div class="notice-item">' + n + '</div>').join('')}
                        </div>
                    </div>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });

    document.querySelectorAll('.expand-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const card = btn.closest('.card');
            card.classList.toggle('expanded');
            btn.querySelector('span').textContent = card.classList.contains('expanded') ? 'Close' : 'Details';
        });
    });

    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', e => {
            if (e.target.closest('.expand-btn')) return;
            openModal(parseInt(card.dataset.id));
        });
    });
}

/* ===== MODAL ===== */
function openModal(id) {
    const a = activities.find(x => x.id === id);
    if (!a) return;

    document.getElementById('modalIcon').innerHTML = icons[a.icon] || icons.divergent;
    document.getElementById('modalTitle').textContent = a.title;
    document.getElementById('modalTag').innerHTML =
        icons[a.category] + ' ' + a.categoryLabel + ' &nbsp;·&nbsp; ' + a.time;

    document.getElementById('modalBody').innerHTML = `
        <div class="modal-goal">${a.goal}</div>
        <div class="modal-desc">${a.description}</div>
        <div class="modal-section">
            <h4>${icons.materials} Materials Needed</h4>
            <div class="materials-grid">
                ${a.materials.map(m => '<span class="material-chip">' + m + '</span>').join('')}
            </div>
        </div>
        <div class="modal-section">
            <h4>${icons.instructions} Instructions</h4>
            <ol class="step-list">
                ${a.instructions.map((s, i) => '<li><span class="step-num">' + (i+1) + '</span>' + s + '</li>').join('')}
            </ol>
        </div>
        <div class="modal-section">
            <h4>${icons.todo} What To Do</h4>
            <ul class="bullet-list">
                ${a.todo.map(t => '<li><span class="bullet-arrow">→</span>' + t + '</li>').join('')}
            </ul>
        </div>
        <div class="modal-section">
            <h4>${icons.notice} What To Notice</h4>
            <div class="notice-grid">
                ${a.notice.map(n => '<div class="notice-item">' + n + '</div>').join('')}
            </div>
        </div>
    `;

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ===== FILTER & SEARCH ===== */
function updateDisplay() {
    let filtered = [...activities];
    if (currentFilter !== 'all') filtered = filtered.filter(a => a.category === currentFilter);
    if (currentSearch.trim()) {
        const q = currentSearch.toLowerCase();
        filtered = filtered.filter(a =>
            a.title.toLowerCase().includes(q) ||
            a.goal.toLowerCase().includes(q) ||
            a.description.toLowerCase().includes(q) ||
            a.categoryLabel.toLowerCase().includes(q) ||
            a.materials.some(m => m.toLowerCase().includes(q))
        );
    }
    renderCards(filtered);
    document.getElementById('countBadge').textContent =
        filtered.length + ' activit' + (filtered.length === 1 ? 'y' : 'ies');
}

document.getElementById('filterBtns').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    updateDisplay();
});

document.getElementById('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    updateDisplay();
});

/* ===== INIT ===== */
renderCards(activities);
</script>
</body>
</html>
